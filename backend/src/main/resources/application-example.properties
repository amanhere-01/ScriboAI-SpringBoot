spring.application.name=scriboAI

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/scriboai
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Use a strong Base64-encoded secret for signing tokens
jwt.secret=your_base64_encoded_jwt_secret

# Google OAuth
# Optional unless you enable Google login
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
spring.security.oauth2.client.registration.google.scope=email,profile

# AI providers
# Add one or both depending on which providers you want to use
ai.gemini.api-key=your_gemini_api_key
ai.groq.api-key=your_groq_api_key
