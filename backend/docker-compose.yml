version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-scriboai
    environment:
      POSTGRES_DB: scriboai
      POSTGRES_USER: chicony
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
